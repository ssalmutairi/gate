apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-deno
  labels:
    app: gate-deno
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gate-deno
  template:
    metadata:
      labels:
        app: gate-deno
    spec:
      containers:
        - name: gate-deno
          image: gate-deno:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: PROXY
              valueFrom:
                configMapKeyRef:
                  name: gate-deno-config
                  key: PROXY
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
