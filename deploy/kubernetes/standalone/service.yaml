apiVersion: v1
kind: Service
metadata:
  name: gate-standalone
  labels:
    app: gate-standalone
spec:
  selector:
    app: gate-standalone
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
    - name: admin
      port: 9000
      targetPort: admin
    - name: metrics
      port: 9090
      targetPort: metrics
