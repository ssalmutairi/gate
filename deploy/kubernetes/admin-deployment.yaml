apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-admin
  namespace: gate
  labels:
    app.kubernetes.io/name: gate
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gate
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gate
        app.kubernetes.io/component: admin
    spec:
      serviceAccountName: gate
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: registry.lab/apps/gate:1.6.2
          command: ["/usr/local/bin/gate-admin"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: admin
              containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gate
                  key: DATABASE_URL
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gate
                  key: ADMIN_TOKEN
          startupProbe:
            httpGet:
              path: /admin/health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /admin/health
              port: admin
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /admin/health
              port: admin
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
