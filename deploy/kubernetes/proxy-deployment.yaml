apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-proxy
  namespace: gate
  labels:
    app.kubernetes.io/name: gate
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gate
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gate
        app.kubernetes.io/component: proxy
    spec:
      serviceAccountName: gate
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: registry.lab/apps/gate:1.6.1
          command: ["/usr/local/bin/gate-proxy"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gate
                  key: DATABASE_URL
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gate
                  key: ADMIN_TOKEN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gate
                  key: REDIS_URL
          startupProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: proxy
                topologyKey: kubernetes.io/hostname
