apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-portable
  labels:
    app: gate-portable
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gate-portable
  template:
    metadata:
      labels:
        app: gate-portable
    spec:
      containers:
        - name: gate
          image: gate:latest
          command: ["/usr/local/bin/gate-portable"]
          ports:
            - name: proxy
              containerPort: 8080
            - name: admin
              containerPort: 9000
            - name: metrics
              containerPort: 9090
          env:
            - name: DATABASE_URL
              value: "sqlite:///data/gate.db"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gate-portable-secret
                  key: admin-token
            - name: PROXY_PORT
              value: "8080"
            - name: ADMIN_PORT
              value: "9000"
            - name: METRICS_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /admin/health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin/health
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gate-portable-data
