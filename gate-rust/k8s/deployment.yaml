apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-rust
  labels:
    app: gate-rust
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gate-rust
  template:
    metadata:
      labels:
        app: gate-rust
    spec:
      containers:
        - name: gate-rust
          image: gate-rust:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: PROXY
              valueFrom:
                configMapKeyRef:
                  name: gate-rust-config
                  key: PROXY
            - name: RUST_LOG
              value: "gate_rust=info"
          resources:
            requests:
              memory: "16Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
