apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-java
  labels:
    app: gate-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gate-java
  template:
    metadata:
      labels:
        app: gate-java
    spec:
      containers:
        - name: gate-java
          image: gate-java:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: PROXY
              valueFrom:
                configMapKeyRef:
                  name: gate-java-config
                  key: PROXY
            - name: LOG_LEVEL
              value: "INFO"
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
