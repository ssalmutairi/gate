name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: dashboard
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-14
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

      - name: Install Rust toolchain
        if: ${{ !matrix.use_cross }}
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --bin proxy --bin admin --bin portable

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }} --bin proxy --bin admin --bin portable

      - name: Codesign macOS binaries
        if: runner.os == 'macOS'
        run: |
          for bin in proxy admin portable; do
            codesign --force --sign - target/${{ matrix.target }}/release/${bin}
          done

      - name: Package archive
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="gate-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp target/${{ matrix.target }}/release/proxy "${ARCHIVE}/gate-proxy"
          cp target/${{ matrix.target }}/release/admin "${ARCHIVE}/gate-admin"
          cp target/${{ matrix.target }}/release/portable "${ARCHIVE}/gate-portable"
          cp -r migrations/ "${ARCHIVE}/migrations"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            gate-*.tar.gz
            gate-*.tar.gz.sha256
          retention-days: 1

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cat *.sha256 | sort > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gate-*.tar.gz
            SHA256SUMS.txt
