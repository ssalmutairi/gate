# Dev overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Enables hot reload for Rust gateway (admin + proxy).
# Dashboard must be pre-built: cd dashboard && npm run build

services:
  gateway:
    build: !reset null
    image: rust:1-slim-bookworm
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/app/target
    working_dir: /app
    command:
      - /bin/bash
      - -c
      - |
        apt-get update && apt-get install -y pkg-config libssl-dev cmake >/dev/null 2>&1
        cargo install cargo-watch --locked 2>/dev/null
        cargo watch -x 'run --bin admin' &
        cargo watch -x 'run --bin proxy'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/admin/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
