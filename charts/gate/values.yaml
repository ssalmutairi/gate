# -- Gate API Gateway Helm Values

# -- Docker image settings (shared by proxy and admin)
image:
  repository: ghcr.io/ssalmutairi/gate
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Gate configuration (non-sensitive env vars)
config:
  proxyPort: 8080
  adminPort: 9000
  adminBindAddr: "0.0.0.0"
  logLevel: info
  configPollIntervalSecs: 5
  healthCheckIntervalSecs: 10
  metricsPort: 9091
  # -- Set to override the auto-constructed DATABASE_URL from the postgresql subchart
  databaseUrl: ""
  # -- Set to override the auto-constructed REDIS_URL from the redis subchart
  redisUrl: ""
  redisPoolSize: 8
  trustedProxies: ""

# -- Sensitive values
secrets:
  # -- Admin API token (required)
  adminToken: "changeme"
  # -- Use an existing Secret instead of creating one.
  # The secret must contain keys: ADMIN_TOKEN, DATABASE_URL, and optionally REDIS_URL
  existingSecret: ""

# -- Proxy component
proxy:
  replicaCount: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  nodeSelector: {}
  tolerations: []

  # -- Soft anti-affinity to spread proxy pods across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: proxy
            topologyKey: kubernetes.io/hostname

  podAnnotations: {}
  podLabels: {}

  # -- PodDisruptionBudget
  pdb:
    enabled: true
    minAvailable: 1

  # -- HorizontalPodAutoscaler (disabled by default)
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9091

# -- Admin component
admin:
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podAnnotations: {}
  podLabels: {}

  # -- PodDisruptionBudget
  pdb:
    enabled: true
    minAvailable: 1

  # -- Rolling update strategy: don't kill old pod before new one is ready
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  service:
    type: ClusterIP
    port: 9000

# -- Ingress (disabled by default)
ingress:
  enabled: false
  className: ""
  # -- Proxy ingress (public traffic)
  proxy:
    annotations: {}
    hosts:
      - host: gateway.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  # -- Admin ingress (restricted access)
  admin:
    annotations: {}
    # annotations:
    #   nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
    hosts:
      - host: gateway-admin.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# -- Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
  labels: {}

# -- Security context applied to all pods
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Bitnami PostgreSQL subchart
postgresql:
  enabled: true
  auth:
    username: gate
    password: gate
    database: gate
  primary:
    persistence:
      size: 10Gi

# -- Bitnami Redis subchart
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
