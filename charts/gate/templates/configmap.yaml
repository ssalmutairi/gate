apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gate.fullname" . }}
  labels:
    {{- include "gate.labels" . | nindent 4 }}
data:
  PROXY_PORT: {{ .Values.config.proxyPort | quote }}
  ADMIN_PORT: {{ .Values.config.adminPort | quote }}
  ADMIN_BIND_ADDR: {{ .Values.config.adminBindAddr | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CONFIG_POLL_INTERVAL_SECS: {{ .Values.config.configPollIntervalSecs | quote }}
  HEALTH_CHECK_INTERVAL_SECS: {{ .Values.config.healthCheckIntervalSecs | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  REDIS_POOL_SIZE: {{ .Values.config.redisPoolSize | quote }}
  {{- if .Values.config.trustedProxies }}
  TRUSTED_PROXIES: {{ .Values.config.trustedProxies | quote }}
  {{- end }}
