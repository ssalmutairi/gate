{{- if .Values.admin.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "gate.fullname" . }}-admin
  labels:
    {{- include "gate.labels" . | nindent 4 }}
    {{- include "gate.admin.selectorLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.admin.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "gate.admin.selectorLabels" . | nindent 6 }}
{{- end }}
