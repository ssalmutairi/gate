apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gate.fullname" . }}-admin
  labels:
    {{- include "gate.labels" . | nindent 4 }}
    {{- include "gate.admin.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicaCount }}
  {{- with .Values.admin.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gate.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.admin.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gate.labels" . | nindent 8 }}
        {{- include "gate.admin.selectorLabels" . | nindent 8 }}
        {{- with .Values.admin.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gate.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: admin
          image: "{{ .Values.image.repository }}:{{ include "gate.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/gate-admin"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: admin
              containerPort: {{ .Values.config.adminPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gate.fullname" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gate.secretName" . }}
                  key: DATABASE_URL
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gate.secretName" . }}
                  key: ADMIN_TOKEN
            {{- if or .Values.redis.enabled .Values.config.redisUrl }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gate.secretName" . }}
                  key: REDIS_URL
            {{- end }}
          # Admin has /admin/health — use HTTP probes
          # Longer startup probe to allow for DB migrations
          startupProbe:
            httpGet:
              path: /admin/health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /admin/health
              port: admin
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /admin/health
              port: admin
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
      {{- with .Values.admin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
